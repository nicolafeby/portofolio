name: Deploy Portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portfolio-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        env:
          PORT: ${{ vars.DEPLOY_PORT || '1998' }}
        run: bash scripts/deploy-server.sh
